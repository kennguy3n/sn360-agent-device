version: '3.8'
services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.2
    ports:
      - "1514:1514"    # agent communication (TCP)
      - "1515:1515"    # enrollment (authd)
      - "55000:55000"  # API
    environment:
      - WAZUH_MANAGER_CONFIG=yes
    volumes:
      - wazuh-data:/var/ossec/data
      - wazuh-logs:/var/ossec/logs
    healthcheck:
      test: ["CMD", "/var/ossec/bin/wazuh-control", "status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
volumes:
  wazuh-data:
  wazuh-logs:
