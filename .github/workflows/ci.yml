name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libyara-dev libsystemd-dev
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev
      - name: Run tests
        run: cargo test --all

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev
      - name: Build
        run: cargo build --release

  e2e:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: bash tests/scripts/run-e2e.sh
            deps: sudo apt-get update && sudo apt-get install -y libsystemd-dev
          - os: macos-latest
            script: bash tests/scripts/run-e2e-macos.sh
            deps: echo "No extra deps needed"
          - os: windows-latest
            script: pwsh tests/scripts/run-e2e-windows.ps1
            deps: echo "No extra deps needed"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: ${{ matrix.deps }}
      - name: Build release
        run: cargo build --release
      - name: Run E2E tests
        run: ${{ matrix.script }}
        timeout-minutes: 15

  nightly-benchmark:
    name: Nightly Benchmark
    runs-on: ubuntu-latest
    if: github.event.schedule != ''
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev sysstat
      - name: Build release
        run: cargo build --release
      - name: Run benchmarks
        run: bash tests/scripts/benchmark.sh
      - name: Run micro-benchmarks
        run: bash tests/scripts/micro-benchmark.sh
