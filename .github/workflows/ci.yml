name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libyara-dev libsystemd-dev
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # Platform matrix (Phase 6 task 6.2). We cover both Ubuntu LTS
      # releases and both recent macOS majors so a native-API regression
      # on one runner surface shows up in CI without waiting for the
      # next release cycle. Fedora and Arch are not available as
      # GitHub-hosted runners and are documented for manual smoke
      # testing in docs/platform-testing.md.
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-13
          - macos-14
          - windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev
      - name: Run tests
        run: cargo test --all

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # Fail the job on any unpatched advisory against a direct or
        # transitive dependency. `--deny warnings` also promotes
        # warnings-only advisories (e.g. unmaintained crates) into
        # CI failures so they cannot silently accumulate.
        run: cargo audit --deny warnings

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: release
            profile_dir: release
            binary: sda-agent
            artifact: sda-agent-linux
          - os: macos-latest
            # macOS GitHub runners are extremely slow under fat LTO; use the
            # `ci` profile (thin LTO, 4 codegen units) to keep wall-clock time
            # reasonable. The final release binary is built by the dedicated
            # release workflow with `--release`.
            profile: ci
            profile_dir: ci
            binary: sda-agent
            artifact: sda-agent-macos
          - os: windows-latest
            profile: release
            profile_dir: release
            binary: sda-agent.exe
            artifact: sda-agent-windows
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev
      - name: Build
        run: cargo build --profile ${{ matrix.profile }} -p sda-agent
      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.profile_dir }}/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: bash tests/scripts/run-e2e.sh
            deps: sudo apt-get update && sudo apt-get install -y libsystemd-dev
            artifact: sda-agent-linux
            binary: sda-agent
            profile_dir: release
          # macos-latest is intentionally excluded: GitHub-hosted macOS runners
          # do not have Docker, which `run-e2e-macos.sh` requires to bring up
          # a Wazuh manager. The script itself also short-circuits when Docker
          # is unavailable, but skipping the job entirely avoids burning runner
          # minutes on a guaranteed no-op.
          #
          # windows-latest is intentionally excluded: the Wazuh manager Docker
          # image (wazuh/wazuh-manager:4.9.2) is Linux-only and cannot run on
          # GitHub-hosted Windows runners which only support Windows containers.
          # Windows E2E validation happens on self-hosted runners or local dev
          # machines with Docker Desktop configured for Linux containers.
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: ${{ matrix.deps }}
      - name: Download prebuilt agent binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.profile_dir }}
      - name: Restore executable bit (Unix)
        if: runner.os != 'Windows'
        run: chmod +x target/${{ matrix.profile_dir }}/${{ matrix.binary }}
      - name: Run E2E tests
        run: ${{ matrix.script }}
        timeout-minutes: 20

  nightly-benchmark:
    name: Nightly Benchmark
    runs-on: ubuntu-latest
    if: github.event.schedule != ''
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev sysstat
      - name: Build release
        run: cargo build --release
      - name: Run benchmarks
        run: bash tests/scripts/benchmark.sh
      - name: Run micro-benchmarks
        run: bash tests/scripts/micro-benchmark.sh

  benchmark-regression:
    name: Benchmark Regression Gate
    runs-on: ubuntu-latest
    # Nightly only. Enforcing hard performance budgets on every PR is
    # too flaky on noisy shared runners; the nightly cron gives a
    # stable signal and the artifact retains the last numbers.
    if: github.event.schedule != ''
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev sysstat bc
      - name: Run regression benchmark
        run: bash tests/scripts/benchmark-regression.sh
      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-regression
          path: target/benchmark-regression/
          if-no-files-found: warn
          retention-days: 30
